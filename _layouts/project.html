<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katy Chung / UX Designer / Tokyo / {{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ "assets/vendor/bootstrap/css/bootstrap.min.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "assets/css/katy.css" | relative_url }}">
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
  <script src="https://unpkg.com/@rive-app/canvas"></script>
  <script>
    document.querySelectorAll(".rive-canvas").forEach(canvas => {
      const riveFile = canvas.dataset.rive;
      const machineName = canvas.dataset.machine;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      new rive.Rive({
        src: riveFile,
        canvas: canvas,
        autoplay: true,
        stateMachines: [machineName],
        devicePixelRatio: dpr,
      });
    });
  </script>
  <script src="https://kit.fontawesome.com/971eb46c9b.js" crossorigin="anonymous"></script>
  {% if site.url != "http://localhost:4000" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JN6LW9SD9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6JN6LW9SD9');
  </script>
  {% endif %}
</head>
<body>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="/assets/js/bootstrap.min.js"></script>
  {% include navigation.html %}

  <div class="site-layout">
    {% include sidebar.html %}
    <main class="main-content">

      <div id="passwordForm" class="container content-wrapper py-5">
        <h2>Password Required</h2>
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          class="form-control"
          onkeypress="checkPassword(event)"
        />
        <button class="btn btn-secondary btn-lg mt-2" onclick="checkPassword(event)">Submit</button>
        <p class="text-sm mt-2">*<a href="/about.html#contact-form">Request access via the contact form.</a></p>
      </div>

      <div id="content" style="display:none;">
        {{ content }}
      </div>

    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("password").focus();
    });

    function checkPassword(event) {
      if (event.keyCode === 13 || event.type === "click") {
        var password = document.getElementById("password").value;
        if (password === "kaki") {
          document.getElementById("content").style.display = "block";
          document.getElementById("passwordForm").style.display = "none";
        } else {
          alert("Incorrect password. Please try again.");
        }
      }
    }
  </script>
</body>
</html>
